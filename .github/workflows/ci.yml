name: Banking CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Welcome Message
        run: echo "Welcome to GitHub Actions"

      - name: Display Current Directory
        run: pwd

      - name: List Files
        run: ls -la
