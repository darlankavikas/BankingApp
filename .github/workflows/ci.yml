name: Java CI Pipeline

on:
  push:
    branches:
      - main
      - github-actions-java

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show Java Version
        run: java -version

      - name: Compile Java
        run: javac Hello.java

      - name: Run Java Program
        run: java Hello
